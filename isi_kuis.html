function load(){

let q = quizData[materi][level][index];

document.getElementById("question").innerText =
(index+1)+". "+q.q;

let html = "";

q.a.forEach((v,i)=>{

html += `
<div class="option" onclick="select(${i})">
${v}
</div>
`;

});

document.getElementById("options").innerHTML = html;

}

function select(i){

let q = quizData[materi][level][index];

document.querySelectorAll(".option").forEach((el,idx)=>{

if(idx===q.c){
el.classList.add("correct");
}else{
el.classList.add("wrong");
}

});

if(i===q.c){
score++;
}

}

function next(){

index++;

if(index < quizData[materi][level].length){

load();

}else{

document.querySelector(".container").innerHTML = `
<h2>🎉 Finish!</h2>

<p style="text-align:center;font-size:22px;">
Score Kamu : ${score} / ${quizData[materi][level].length}
</p>

<button class="btn" onclick="location.reload()">
Main Lagi
</button>
`;

}

}

load();

</script>
